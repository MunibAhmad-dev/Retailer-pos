<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OsaTech Admin</title>
    <!-- Apply dark class synchronously so Tailwind dark: variants work before React mounts -->
    <script>
      (function () {
        var t = localStorage.getItem('admin-theme');
        if (t !== 'light') document.documentElement.classList.add('dark');
      })();
    </script>
    <!-- Restore path after GitHub Pages 404 redirect (not used on Vercel) -->
    <script>
      (function () {
        var search = window.location.search;
        var match = search.match(/[?&]p=([^#]*)/);
        if (!match) return;
        // Decode once — stop if it would produce another ?p= (loop detection)
        var decoded = decodeURIComponent(match[1]);
        if (decoded.indexOf('%') !== -1) return; // double-encoded — something went wrong, bail
        var parts = decoded.split('&');
        var pathname = '/' + parts[0];
        var query = parts.length > 1 ? '?' + parts.slice(1).join('&') : '';
        window.history.replaceState(null, null, pathname + query);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
