<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OsaTech Admin</title>
  <script>
    // GitHub Pages SPA redirect — only used on GitHub Pages (Vercel uses vercel.json rewrites).
    // Always redirect to the SITE ROOT with the path encoded as ?p=...
    // Never redirect to a sub-path (e.g. /licenses/?p=...) — that creates an infinite loop
    // because the sub-path is also a 404, which fires this script again.
    (function () {
      var l = window.location;
      // If ?p= is already in the URL, we're in a loop — break out by going to root
      if (l.search.indexOf('?p=') !== -1 || l.search.indexOf('&p=') !== -1) {
        l.replace(l.protocol + '//' + l.host + '/');
        return;
      }
      var path = l.pathname.slice(1); // strip leading /
      if (!path) return; // already at root
      var search = l.search ? l.search.slice(1) : '';
      var encoded = encodeURIComponent(path + (search ? '&' + search : ''));
      l.replace(l.protocol + '//' + l.host + '/?p=' + encoded + l.hash);
    })();
  </script>
</head>
<body></body>
</html>
